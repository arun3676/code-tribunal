version: '3.9'
services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    command: uvicorn code_council.server:app --host 0.0.0.0 --port 8000 --workers 1

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
