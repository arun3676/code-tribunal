name: Publish to PyPI

# Trusted Publishing (OIDC): configure this repo + workflow as a publisher on
# pypi.org for the `code-tribunal` project — no API token secrets needed.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install build

      - name: Build sdist and wheel
        working-directory: apps/api
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/api/dist
